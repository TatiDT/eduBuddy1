<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduBuddy — Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #C9E8F7, #B8DFF5);
      overflow: hidden;
    }

    
    .bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .bubble  { position: absolute; border-radius: 50%; opacity: .35; animation: floatUp linear infinite; }
    @keyframes floatUp {
      from { transform: translateY(110vh); opacity: .35; }
      to   { transform: translateY(-15vh);  opacity: 0; }
    }

    
    .card {
      position: relative; z-index: 1;
      display: grid; grid-template-columns: 1fr 1fr;
      max-width: 860px; width: 94%;
      border-radius: 28px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(30,90,140,.18);
      background: #fff;
    }

    
    .panel-left {
      background: linear-gradient(160deg, #5BB8E8, #2E86C1);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 32px; gap: 20px; text-align: center;
    }
    .panel-left img {
      width: 280px;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,.22));
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .panel-left p {
      font-family: 'Poppins', sans-serif; font-weight: 600;
      color: rgba(255,255,255,.9); font-size: 1rem; max-width: 200px;
    }

    
    .panel-right { padding: 52px 44px; display: flex; flex-direction: column; justify-content: center; }

    .welcome {
      font-family: 'Poppins', sans-serif; font-size: .72rem; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase; color: #5BB8E8; margin-bottom: 6px;
    }
    h1 {
      font-family: 'Poppins', sans-serif; font-size: 1.9rem; font-weight: 800;
      color: #1C3A4F; margin-bottom: 32px;
    }
    h1 span { color: #2E86C1; }

    
    .field { margin-bottom: 20px; }
    .field label {
      display: block; font-size: .78rem; font-weight: 500; text-transform: uppercase;
      letter-spacing: .04em; color: #6B92A8; margin-bottom: 6px;
    }
    .wrap { position: relative; }
    .wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #5BB8E8; pointer-events: none; }
    .wrap input {
      width: 100%; padding: 12px 42px;
      border: 2px solid #B8DFF5; border-radius: 12px;
      font-family: 'Inter', sans-serif; font-size: .93rem; color: #1C3A4F;
      background: #F3F9FD; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .wrap input:focus  { border-color: #5BB8E8; box-shadow: 0 0 0 4px rgba(91,184,232,.15); background: #fff; }
    .wrap input.err    { border-color: #E74C3C; }
    .wrap input.ok     { border-color: #27AE60; }
    .btn-eye {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #6B92A8;
    }
    .msg { font-size: .72rem; min-height: 16px; margin-top: 4px; font-weight: 500; }
    .msg.err { color: #E74C3C; }
    .msg.ok  { color: #27AE60; }

    
    .extras { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; font-size: .82rem; }
    .extras label { display: flex; align-items: center; gap: 7px; color: #6B92A8; cursor: pointer; }
    .extras input { accent-color: #2E86C1; }
    .extras a { color: #2E86C1; font-weight: 500; text-decoration: none; }


    .field-row { display: flex; gap: 14px; }
    .field-row .field { flex: 1; min-width: 0; }
    .switch-modo { text-align: center; font-size: .85rem; color: #6B92A8; margin-top: 18px; }
    .switch-modo a { color: #2E86C1; font-weight: 600; text-decoration: none; cursor: pointer; }

    
    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #5BB8E8, #2E86C1);
      color: #fff; font-family: 'Poppins', sans-serif; font-size: 1rem; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 6px 20px rgba(46,134,193,.35);
      transition: transform .15s, box-shadow .15s; position: relative; overflow: hidden;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(46,134,193,.45); }
    .btn-login:disabled { opacity: .75; cursor: not-allowed; transform: none; }

    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,.3); width: 0; height: 0;
      transform: translate(-50%,-50%); animation: ripple .55s ease-out forwards;
    }
    @keyframes ripple { to { width: 300px; height: 300px; opacity: 0; } }

    .spinner {
      display: none; width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px); opacity: 0;
      background: #fff; border-left: 4px solid #2E86C1;
      padding: 14px 22px; border-radius: 12px; font-size: .87rem;
      font-weight: 500; color: #1C3A4F;
      box-shadow: 0 8px 28px rgba(0,0,0,.12); z-index: 100;
      transition: transform .4s cubic-bezier(.22,1,.36,1), opacity .4s;
    }
    .toast.show     { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.err      { border-left-color: #E74C3C; }

    @media (max-width: 640px) {
      .card { grid-template-columns: 1fr; }
      .panel-left { padding: 32px 24px; }
      .panel-left img { width: 190px; }
      .panel-right { padding: 36px 28px; }
      h1 { font-size: 1.55rem; }
    }
  </style>
</head>
<body>

<div class="bubbles" id="bubbles"></div>

<div class="card">
  <div class="panel-left">
    <img src="Img/logoEdu.png" alt="EduBuddy" onerror="this.style.display='none'"/>
    <p>Tu compañero de aprendizaje siempre está aquí</p>
  </div>

  <div class="panel-right">
    <p class="welcome" id="welcomeText">Bienvenido de vuelta</p>
    <h1 id="formTitle">Inicia tu <span>sesión</span></h1>

    <div id="registroFields" style="display:none;">
      <div class="field-row">
        <div class="field">
          <label for="reg-nombre">Nombre</label>
          <div class="wrap">
            <input type="text" id="reg-nombre" placeholder="Tu nombre"/>
          </div>
          <div class="msg" id="reg-nombreMsg"></div>
        </div>
        <div class="field">
          <label for="reg-apellido">Apellido</label>
          <div class="wrap">
            <input type="text" id="reg-apellido" placeholder="Tu apellido"/>
          </div>
          <div class="msg" id="reg-apellidoMsg"></div>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="reg-rut">RUT</label>
          <div class="wrap">
            <input type="text" id="reg-rut" placeholder="20111222-3"/>
          </div>
          <div class="msg" id="reg-rutMsg"></div>
        </div>
        <div class="field">
          <label for="reg-carrera">Carrera</label>
          <div class="wrap">
            <input type="text" id="reg-carrera" placeholder="Tu carrera"/>
          </div>
          <div class="msg" id="reg-carreraMsg"></div>
        </div>
      </div>
    </div>

    <div class="field">
      <label for="email">Correo electrónico</label>
      <div class="wrap">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <input type="email" id="email" placeholder="nombre@ejemplo.cl" autocomplete="email"/>
      </div>
      <div class="msg" id="emailMsg"></div>
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <div class="wrap">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="btn-eye" id="togglePwd" type="button" aria-label="Ver contraseña">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="msg" id="passMsg"></div>
    </div>

    <div class="extras" id="extrasRow">
      <label><input type="checkbox"/> Recordarme</label>
      <a href="#">¿Olvidaste tu contraseña?</a>
    </div>

    <button class="btn-login" id="btnLogin">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">Entrar a EduBuddy</span>
    </button>

    <p class="switch-modo" id="switchModo">¿No tienes cuenta? <a id="toggleModoLink">Regístrate</a></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  
  const colors = ['#B8DFF5','#5BB8E8','#D6EEF8','#2E86C1'];
  Array.from({ length: 22 }, () => {
    const b = Object.assign(document.createElement('div'), { className: 'bubble' });
    const s = Math.random() * 60 + 15;
    const color = colors[Math.floor(Math.random() * colors.length)];
    b.style.cssText = `width:${s}px;height:${s}px;background:${color};left:${Math.random()*100}%;animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*-15}s;`;
    document.getElementById('bubbles').appendChild(b);
  });

  
  const pwd = document.getElementById('password');
  document.getElementById('togglePwd').addEventListener('click', () => {
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
    document.getElementById('eyeIcon').innerHTML = pwd.type === 'text'
      ? `<path d="M17.94 17.94A10 10 0 0 1 12 20c-7 0-11-8-11-8a18 18 0 0 1 5.06-5.94M9.9 4.24A9 9 0 0 1 12 4c7 0 11 8 11 8a18 18 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });


  const rules = {
    email:        v => !v ? 'El correo es obligatorio.' : !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) ? 'Correo inválido.' : '',
    password:     v => !v ? 'La contraseña es obligatoria.' : v.length < 6 ? 'Mínimo 6 caracteres.' : '',
    'reg-nombre':  v => !v ? 'El nombre es obligatorio.' : '',
    'reg-apellido':v => !v ? 'El apellido es obligatorio.' : '',
    'reg-rut':     v => !v ? 'El RUT es obligatorio.' : '',
    'reg-carrera': v => !v ? 'La carrera es obligatoria.' : ''
  };
  const msgIdFor = { email: 'emailMsg', password: 'passMsg' };


  function validate(id) {
    const input = document.getElementById(id);
    const msg   = document.getElementById(msgIdFor[id] || id + 'Msg');
    const error = rules[id](input.value.trim());
    input.className = error ? 'err' : input.value ? 'ok' : '';
    msg.textContent = error || (input.value ? '✓ Correcto' : '');
    msg.className = 'msg ' + (error ? 'err' : 'ok');
    return !error;
  }

  Object.keys(rules).forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('blur',  () => validate(id));
    el.addEventListener('input', () => { el.className = ''; document.getElementById(msgIdFor[id] || id + 'Msg').className = 'msg'; });
  });


  let modoRegistro = false;
  function toggleModo() {
    modoRegistro = !modoRegistro;
    document.getElementById('registroFields').style.display = modoRegistro ? 'block' : 'none';
    document.getElementById('extrasRow').style.display = modoRegistro ? 'none' : 'flex';
    document.getElementById('welcomeText').textContent = modoRegistro ? 'Únete a EduBuddy' : 'Bienvenido de vuelta';
    document.getElementById('formTitle').innerHTML = modoRegistro ? 'Crea tu <span>cuenta</span>' : 'Inicia tu <span>sesión</span>';
    document.getElementById('btnText').textContent = modoRegistro ? 'Crear cuenta' : 'Entrar a EduBuddy';
    document.getElementById('switchModo').innerHTML = modoRegistro
      ? '¿Ya tienes cuenta? <a id="toggleModoLink">Inicia sesión</a>'
      : '¿No tienes cuenta? <a id="toggleModoLink">Regístrate</a>';
    pwd.autocomplete = modoRegistro ? 'new-password' : 'current-password';
  }
  document.getElementById('switchModo').addEventListener('click', (e) => {
    if (e.target.id === 'toggleModoLink') toggleModo();
  });

  
  function toast(msg, isErr = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isErr ? ' err' : '');
    setTimeout(() => t.className = 'toast', 3200);
  }

  
  document.getElementById('btnLogin').addEventListener('click', async (e) => {
    
    const btn = e.currentTarget;
    const r = Object.assign(document.createElement('span'), { className: 'ripple' });
    const rect = btn.getBoundingClientRect();
    r.style.cssText = `left:${e.clientX-rect.left}px;top:${e.clientY-rect.top}px;`;
    btn.appendChild(r);
    setTimeout(() => r.remove(), 600);


    const camposRegistro = ['reg-nombre', 'reg-apellido', 'reg-rut', 'reg-carrera'];
    const okEmail = validate('email');
    const okPass  = validate('password');
    const okRegistro = !modoRegistro || camposRegistro.map(validate).every(Boolean);
    if (!okEmail || !okPass || !okRegistro) return toast('Corrige los errores antes de continuar.', true);


    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = modoRegistro ? 'Creando cuenta…' : 'Verificando…';

    try {
      const url = modoRegistro ? '/api/auth/registro' : '/api/auth/login';
      const body = modoRegistro
        ? {
            nombre: document.getElementById('reg-nombre').value.trim(),
            apellido: document.getElementById('reg-apellido').value.trim(),
            rut: document.getElementById('reg-rut').value.trim(),
            carrera: document.getElementById('reg-carrera').value.trim(),
            correo: document.getElementById('email').value.trim(),
            password: pwd.value
          }
        : { email: document.getElementById('email').value.trim(), password: pwd.value };

      const res  = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();

      if (res.ok) {

        localStorage.setItem('eduBuddyUser', JSON.stringify(data.usuario));
        btnText.textContent = '¡Bienvenido!';
        spinner.style.display = 'none';
        toast(`Bienvenido, ${data.usuario.correo}!`);
        const destino = data.usuario.rol === 'ADMIN' ? '/admin' : '/dashboard';
        setTimeout(() => location.href = destino, 1200);
      } else {
        throw new Error(data.error || (modoRegistro ? 'No se pudo crear la cuenta' : 'Credenciales incorrectas'));
      }
    } catch (err) {

      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = modoRegistro ? 'Crear cuenta' : 'Entrar a EduBuddy';
      toast(err.message, true);
    }
  });
</script>
</body>
</html>
